# .github/workflows/build-my-docker.yml
# 这个 GitHub Actions 工作流用于自动构建 Docker 镜像并将其推送到 GitHub Container Registry (GHCR)。
name: Build and Push Docker Image to GHCR

on:
  # 当创建新的 Git 标签 (e.g., v1.0.0) 时触发
  push:
    tags:
      - '*'
  # 允许手动触发此工作流
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 授予 job 写入 package 的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        # 检出您的代码
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        # 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # GITHUB_TOKEN 是由 GitHub Actions 自动提供的，具有推送包到当前仓库的权限
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        # 提取元数据，如镜像标签和名称
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # 使用 ghcr.io/YOUR_USERNAME/YOUR_REPONAME 作为镜像名
          # 标签将是 'latest' 和 git commit 的短哈希值

      - name: Build and push Docker image
        # 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          # 使用项目根目录下的 Dockerfile
          file: ./docker/Dockerfile
          push: true
          # 使用上一步生成的标签
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}